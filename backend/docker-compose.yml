version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vampter_qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_PORT_GRPC:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Neo4j Graph Database
  neo4j:
    image: neo4j:community
    container_name: vampter_neo4j
    ports:
      - "${NEO4J_PORT_HTTP:-7474}:7474"
      - "${NEO4J_PORT_BOLT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/vampter_neo4j_password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_import:/import
      - neo4j_logs:/logs
    restart: unless-stopped

  # Redis Cache & State Ledger
  redis:
    image: redis:alpine
    container_name: vampter_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_import:
  neo4j_logs:
  redis_data:
